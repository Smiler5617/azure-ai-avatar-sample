<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>天気回答アバターと会話しよう！</title>
  <style>
    *{
        box-sizing:border-box;
    }

    body{
        margin:0;
        padding:16px;
        font-family:sans-serif;
        background:#f5f5f5;
    }

    h2{
        margin-top:0;
        text-align:center;
    }

    .button-area{
        display:flex;
        gap:12px;
        margin-bottom:16px;
    }

    .button-area button{
        flex:1;
        height:52px;
        font-size:18px;
        font-weight:bold;

    }

    .avatar-area{
        display:flex;
        justify-content:center;
        margin-bottom:16px;
    }

    #avatarVideo{

        width:100%;
        max-width:700px;
        height:45vh;
        object-fit:contain;
        background:#000;
        border-radius:12px;
    }

    .card{
        background:white;
        border-radius:10px;
        padding:12px;
        margin-bottom:12px;
    }

    #status,
    #realtime,
    #answer{
        min-height:50px;
        white-space:pre-wrap;
    }

    @media (max-width:768px){
        body{
            padding:12px;
        }
        h2{
            font-size:22px;
        }
        .button-area button{
            height:54px;
            font-size:18px;
        }
        #avatarVideo{
            width:100%;
            height:40vh;
        }
    }
  </style>  
  
</head>
<body>

<h2>Azure AI Speech Avatar Sample</h2>

<div class="button-area">
    <button id="start">🎤 会話開始</button>
    <button id="stop">■ 会話終了</button>
</div>

<div class="avatar-area">
    <video id="avatarVideo" autoplay playsinline></video>
</div>



<div class="card">
    <h3>状態</h3>
    <div id="status">停止中</div>
</div>

<div class="card">
    <h3>認識中</h3>
    <div id="realtime"></div>
</div>

<div class="card">
    <h3>AI回答</h3>
    <div id="answer"></div>
</div>



<script>
const LLM_API_URL = "{{ llm_api_url }}";
</script>

<script src="/static/js/microsoft.cognitiveservices.speech.sdk.bundle.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/stt.js"></script>
<script src="/static/js/llm.js"></script>
<script src="/static/js/avatar.js"></script>

</body>
</html>
